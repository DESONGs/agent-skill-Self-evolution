services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
        http_proxy: ""
        https_proxy: ""
        NO_PROXY: "localhost,127.0.0.1,::1"
        no_proxy: "localhost,127.0.0.1,::1"
    env_file:
      - .env
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,::1,api,postgres,redis,minio,nginx"
      no_proxy: "localhost,127.0.0.1,::1,api,postgres,redis,minio,nginx"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - enterprise_scratch:/var/lib/agent-skill-platform/scratch
    command: >
      sh -lc "alembic upgrade head &&
      uvicorn agent_skill_platform.registry.api:app --host 0.0.0.0 --port 8080"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
        http_proxy: ""
        https_proxy: ""
        NO_PROXY: "localhost,127.0.0.1,::1"
        no_proxy: "localhost,127.0.0.1,::1"
    env_file:
      - .env
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,::1,api,postgres,redis,minio,nginx"
      no_proxy: "localhost,127.0.0.1,::1,api,postgres,redis,minio,nginx"
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - enterprise_scratch:/var/lib/agent-skill-platform/scratch
    command: >
      sh -lc "python -m agent_skill_platform.jobs.worker"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: asp
      POSTGRES_USER: asp
      POSTGRES_PASSWORD: asp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asp -d asp"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - enterprise_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    command: redis-server --save 60 1000 --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - enterprise_redis:/data

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - enterprise_minio:/data

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "${AGENT_SKILL_PLATFORM_NGINX_PORT:-8088}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  enterprise_postgres:
  enterprise_redis:
  enterprise_minio:
  enterprise_scratch:
